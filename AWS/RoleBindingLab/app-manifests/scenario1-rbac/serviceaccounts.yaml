# 시나리오 1 — RBAC
# 두 명의 "사용자"를 ServiceAccount 로 표현합니다.
#   payments-oncall  : 결제팀 온콜 SRE (조회 권한 부여 대상)
#   analytics-intern : 분석팀 인턴   (권한 미부여 → Forbidden 관측용)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payments-oncall
  namespace: payments
  labels:
    payflow.io/role: oncall-sre
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: analytics-intern
  namespace: payments
  labels:
    payflow.io/role: intern
