# eksctl ClusterConfig — LoadTestLab
# private 워커 노드 + NAT(Single) + OIDC(IRSA용).
# create-eks-cluster.sh 가 envsubst 로 ${...} 를 채운 뒤 eksctl 에 넘깁니다.
#
# 노드 스펙 (실측 기준):
#   t3.medium×3  → ~100 RPS 상한 (1000 RPS 부하 시 ~9% 처리)
#   c5.2xlarge×5 → 1,000 RPS 를 겨우 버티는 수준(약 10× CPU, burst 없는 compute 최적화)
# 10k/50k RPS 는 manifest(replicas/resources/HPA) 추가 강화가 필요합니다.
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: ${CLUSTER_NAME}
  region: ${AWS_REGION}
  version: "${K8S_VERSION}"

iam:
  withOIDC: true            # ALB Controller / EBS CSI 의 IRSA 에 필요

vpc:
  nat:
    gateway: Single         # private 노드의 아웃바운드(이미지 pull, ArgoCD git fetch)용

managedNodeGroups:
  - name: ng-workload
    instanceType: ${NODE_INSTANCE_TYPE}
    desiredCapacity: ${NODE_COUNT}
    minSize: ${NODE_MIN_SIZE}
    maxSize: ${NODE_MAX_SIZE}
    privateNetworking: true # 노드를 private subnet 에 배치
    volumeSize: 30
    ssh:
      allow: false
    labels:
      role: workload

# vpc-cni / coredns / kube-proxy 는 EKS 기본 설치.
# aws-ebs-csi-driver 는 IRSA 가 필요하므로 install-addons.sh 에서 별도 설치합니다.
