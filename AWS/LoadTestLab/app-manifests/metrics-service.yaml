# fluentd 사이드카의 Prometheus /metrics(24231) 를 Service 로 노출.
# ServiceMonitor 가 이 Service 를 스크랩합니다.
apiVersion: v1
kind: Service
metadata:
  name: echo-cpu-metrics
  namespace: loadtest
  labels:
    app: echo-cpu
    metrics: fluentd
spec:
  type: ClusterIP
  selector:
    app: echo-cpu
  ports:
    - name: metrics
      port: 24231
      targetPort: 24231
