# Fluentd 사이드카 설정.
# apache access 로그 → 200/500 필터 → Prometheus 카운터 + stdout 로그.
# fluent/fluentd-aggregator 이미지에 fluent-plugin-prometheus 가 포함되어 있습니다.
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentd-config
  namespace: loadtest
data:
  fluent.conf: |
    <source>
      @type prometheus
      bind 0.0.0.0
      port 24231
      metrics_path /metrics
    </source>

    <source>
      @type tail
      path /var/log/apache2/access.log
      pos_file /tmp/apache-access.pos
      tag app.access
      read_from_head true
      <parse>
        @type apache2
      </parse>
    </source>

    <filter app.access>
      @type grep
      <regexp>
        key code
        pattern /^(200|500)$/
      </regexp>
    </filter>

    <filter app.access>
      @type prometheus
      <metric>
        name http_responses_total
        type counter
        desc HTTP responses by status code (200/500)
        <labels>
          code ${code}
          namespace loadtest
        </labels>
      </metric>
    </filter>

    <filter app.access>
      @type record_transformer
      renew_record true
      keep_keys code
    </filter>

    <match app.access>
      @type stdout
    </match>
