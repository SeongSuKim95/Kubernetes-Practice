# Fluentd 사이드카 설정.
# apache access 로그를 tail → 상태코드 200/500 만 남김 → stdout 으로 기록.
# (fluent-plugin-prometheus 포함 이미지는 Docker Hub 에 없어 stdout 로그 방식 사용)
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentd-config
  namespace: loadtest
data:
  fluent.conf: |
    <source>
      @type tail
      path /var/log/apache2/access.log
      pos_file /tmp/apache-access.pos
      tag app.access
      read_from_head true
      <parse>
        @type apache2
      </parse>
    </source>

    <filter app.access>
      @type grep
      <regexp>
        key code
        pattern /^(200|500)$/
      </regexp>
    </filter>

    <filter app.access>
      @type record_transformer
      renew_record true
      keep_keys code
    </filter>

    <match app.access>
      @type stdout
    </match>
