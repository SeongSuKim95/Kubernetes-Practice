# [초기 지급 manifest] HPA 도 일부러 약하게(maxReplicas 낮게) 설정.
# 실습 중 maxReplicas / averageUtilization / behavior 를 조정해
# 증가하는 트래픽에서 200 100% 를 유지하도록 만듭니다.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: echo-cpu
  namespace: loadtest
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: echo-cpu
  minReplicas: 1
  maxReplicas: 3          # 처음엔 낮게 → 실습 중 상향
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60
