# 라우팅 규칙(HTTPRoute) — 앱 역할. host app.example.com 의 path 분기.
#   /foo → echo-foo,  /bar → echo-bar  (Ingress 와 동등한 host/path 라우팅)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-route
  namespace: gateway-demo
spec:
  parentRefs:
    - name: web-gateway
  hostnames:
    - "app.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /foo
      backendRefs:
        - name: echo-foo
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /bar
      backendRefs:
        - name: echo-bar
          port: 80
