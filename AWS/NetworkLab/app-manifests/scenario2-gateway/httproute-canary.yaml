# 가중치 기반 트래픽 분할(HTTPRoute) — Gateway API 가 Ingress 대비 갖는 강점.
#   host canary.example.com → echo-v1 90% / echo-v2 10%
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: canary-route
  namespace: gateway-demo
spec:
  parentRefs:
    - name: web-gateway
  hostnames:
    - "canary.example.com"
  rules:
    - backendRefs:
        - name: echo-v1
          port: 80
          weight: 90
        - name: echo-v2
          port: 80
          weight: 10
